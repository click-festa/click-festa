<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    
video{
  width:100%;
  max-width:400px;
  height: auto;
  border-radius:515px;
  background:#333;
 
#shootBtn{
  position:fixed;
  bottom:30px;
  left:50%
  transform:translateX(-50%);
  width: 80%;
  height: 80px;
  background:white;
  border-radius: 50%;
  border:4px solid rgba(255,255,255,0.8);
}

.inner {
  width:60%;
  height:60%;
  background:black;
  border-radius:50%;
  margin:auto;
}
  
</style>
<title>CLICK FESTA</title>
</head>

<body style="background:#f4ecd8; text-align:center; font-family:sans-serif; margin:0;">
<h1>📸 CLICK FESTA</h1>

<video id="video" autoplay playsinline muted></video>

<button id="shootBtn">
  <div class="inner"></div>
</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const btn = document.getElementById("shootBtn");
const canvas = document.getElementById("canvas");

let started = false;

btn.onclick = async () => {

  // ① カメラ起動
  if (!started) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      started = true;
      return;

    } catch (e) {
      alert(e.message);
      return;
    }
  }

  // ② 撮影
  const ctx = canvas.getContext("2d");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  alert("撮影OK");
};
</script>

</body>
</html>
