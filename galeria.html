<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GALERIA</title>
<style>
  body {
    text-align: center;
    background: #f4ecd8;
    font-family: sans-serif;
  }
  #gallery {
    display: flex;
    flex-direction: column;
    align-oitems: center;
  }
  .frame {
    background: #fff;
    padding: 10px;
    padding-bottom: 30px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.2s;
  }
  img {
    max-width:100%;
    height: auto;
    display:block;
  }
  .frame img {
    width: 100%;
    height: auto;
    object-fit:cover;
  }
  .frame:hover {
    transform: scale(1.05) rotate(0deg);
  }
</style>
</head>

<body>
<p id="loading">CARREGANDO...</p>
<h1>📸 AS FOTOS DE TODOS</h1>

<div id="gallery"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getStorage, ref, listAll, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ===== Firebase 設定 =====
const firebaseConfig = {
  apiKey: "AIzaSyAy-fte7-6MboK9YKBnDfKebpnPGIA1FvY",
  authDomain: "click-festa.firebaseapp.com",
  projectId: "click-festa",
  storageBucket: "click-festa.firebasestorage.app",
  messagingSenderId: "826663176182",
  appId: "1:826663176182:web:d148256e828ab07dcaa9d7"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

// ===== URL パラメータで ID 取得 =====
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "default";

const gallery = document.getElementById("gallery");

// ===== ① 有効期限チェック =====
async function checkExpiration() {
  try {
    const docRef = doc(db, "events", id);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
      document.body.innerHTML = "<h1>Erro</h1>";
      throw new Error("no data");
     }
    const data = docSnap.data();
    const expires = data.expiresAt.toDate();
    const now = new Date();

    if (now > expires) {
      document.body.innerHTML = "<h1>Expirado</h1>";
      throw new Error ("expired");
    }
    document.getElementById("loading").innerText = "";
    await loadImages();
    return true;

  } catch (e) {
    console.error("Firestore エラー:", e);
    document.getElementById("loading").innerText = "Erro ao carregar dados do evento";
    return false;
  }
}

// ===== ② 画像読み込み =====
async function loadImages() {
  try {
    const listRef = ref(storage, id);
    const res = await listAll(listRef);

    if (res.items.length === 0) {
      document.getElementById("loading").innerText = "Nenhuma imagem encontrada";
      return;
    }

    const items = res.items.sort((a, b) => b.name.localeCompare(a.name));

    for (const item of items) {
      const url = await getDownloadURL(item);

      const frame = document.createElement("div");
      frame.classList.add("frame");
      frame.style.transform = `rotate(${Math.random()*6 - 3}deg)`;

      const img = document.createElement("img");
      img.src = url;
      img.alt = "Foto do evento";
      img.onclick = () => window.open(url, "_blank");

      frame.appendChild(img);
      gallery.appendChild(frame);
    }

    document.getElementById("loading")?.remove();

  } catch (e) {
    console.error("Storage エラー:", e);
    document.getElementById("loading").innerText = "Erro ao carregar imagens";
  }
}

// ===== ③ 初期化 =====
async function initGallery() {
  const valid = await checkExpiration();
  if (valid) {ß
  }
}

// ページ読み込み後に実行
window.addEventListener("DOMContentLoaded", initGallery);

</script>
</body>
</html>
