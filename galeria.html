<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getStorage, ref, listAll, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAy-fte7-6MboK9YKBnDfKebpnPGIA1FvY",
  authDomain: "click-festa.firebaseapp.com",
  projectId: "click-festa",
  storageBucket: "click-festa.firebasestorage.app",
  messagingSenderId: "826663176182",
  appId: "1:826663176182:web:d148256e828ab07dcaa9d7"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

// ===== ID取得 =====
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "default";

const gallery = document.getElementById("gallery");

// ===== ① 期限チェック =====
async function checkExpiration() {
  try {
    const docRef = doc(db, "events", id);
    const docSnap = await getDoc(docRef);

    if (!docSnap.exists()) {
      document.getElementById("loading").innerText = "Evento não encontrado";
      return false;
    }

    const data = docSnap.data();
    const now = Date.now();

    if (now > data.expiresAt) {
      document.body.innerHTML = "<h1>Expirado</h1><p>Este QR expirou</p>";
      return false;
    }

    return true;

  } catch (e) {
    console.error(e);
    document.getElementById("loading").innerText = "Erro ao carregar";
    return false;
  }
}

// ===== ② 画像読み込み =====
async function loadImages() {
  try {
    const listRef = ref(storage, id);
    const res = await listAll(listRef);

    const items = res.items.sort((a, b) => {
      return b.name.localeCompare(a.name);
    });

    for (const item of items) {
      const url = await getDownloadURL(item);

      const frame = document.createElement("div");
      frame.style.background = "#fff";
      frame.style.padding = "10px";
      frame.style.paddingBottom = "30px";
      frame.style.borderRadius = "10px";
      frame.style.boxShadow = "0 8px 20px rgba(0,0,0,0.2)";
      frame.style.transform = `rotate(${Math.random()*6 - 3}deg)`;

      const img = document.createElement("img");
      img.src = url;
      img.style.width = "100%";
      img.style.borderRadius = "5px";

      img.onclick = () => window.open(url, "_blank");

      frame.appendChild(img);
      gallery.appendChild(frame);
    }

    document.getElementById("loading")?.remove();

  } catch (e) {
    console.error(e);
    document.getElementById("loading").innerText = "Erro ao carregar imagens";
  }
}

// ===== 実行 =====
const valid = await checkExpiration();
if (valid) {
  loadImages();
}

</script>
